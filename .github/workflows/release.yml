name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  TEST_PORT: 9000
  NODE_VERSION: '16'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: node16-win-x64
            output: bilup-desktop-extras.exe
            asset-name: bilup-desktop-extras-windows.exe
          - os: macos-latest
            target: node16-macos-x64
            output: bilup-desktop-extras-macos
            asset-name: bilup-desktop-extras-macos
          - os: ubuntu-latest
            target: node16-linux-x64
            output: bilup-desktop-extras-linux
            asset-name: bilup-desktop-extras-linux
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Cache pkg
        uses: actions/cache@v4
        with:
          path: ~/.pkg-cache
          key: ${{ runner.os }}-pkg-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-pkg-
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install pkg
        run: npm install -g pkg
      
      - name: Build executable
        run: pkg . --output ${{ matrix.output }} --target ${{ matrix.target }}
      
      - name: Test on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $process = Start-Process -FilePath ".\${{ matrix.output }}" -ArgumentList "--peerjs-port ${{ env.TEST_PORT }}" -PassThru
          Start-Sleep -Seconds 5
          $portUsed = Get-NetTCPConnection -LocalPort ${{ env.TEST_PORT }} -ErrorAction SilentlyContinue
          if ($portUsed) {
            Write-Host "✓ Server started successfully on port ${{ env.TEST_PORT }}"
          } else {
            Write-Host "✗ Failed to start server on port ${{ env.TEST_PORT }}"
            Stop-Process -Id $process.Id -ErrorAction SilentlyContinue
            exit 1
          }
          Stop-Process -Id $process.Id -ErrorAction SilentlyContinue
      
      - name: Test on macOS
        if: matrix.os == 'macos-latest'
        run: |
          chmod +x ${{ matrix.output }}
          echo "File info:"
          ls -la ${{ matrix.output }}
          echo "Checking if port 9000 is available..."
          if lsof -Pi :9000 -sTCP:LISTEN -t >/dev/null ; then
            echo "Port 9000 is already in use"
            exit 1
          fi
          echo "Bypassing macOS security..."
          xattr -d com.apple.quarantine ${{ matrix.output }} 2>/dev/null || true
          echo "Starting server..."
          ./${{ matrix.output }} --peerjs-port 9000 > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          sleep 5
          echo "Server log:"
          cat server.log
          echo "Process status:"
          ps aux | grep -E "${{ matrix.output }}|peer" | grep -v grep
          echo "Checking port..."
          lsof -Pi :9000 -sTCP:LISTEN 2>/dev/null || netstat -an | grep 9000 || true
          if lsof -Pi :9000 -sTCP:LISTEN -t >/dev/null ; then
            echo "Server started successfully on port 9000"
            kill $SERVER_PID 2>/dev/null || true
          else
            echo "Failed to start server on port 9000"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
      
      - name: Test on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x ${{ matrix.output }}
          ./${{ matrix.output }} --peerjs-port 9000 &
          sleep 3
          if ss -tlnp | grep :9000 > /dev/null ; then
            echo "Server started successfully on port 9000"
          else
            echo "Failed to start server on port 9000"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset-name }}
          path: ${{ matrix.output }}
          retention-days: 7
  
  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      
      - name: Create release directory
        run: mkdir -p release
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: bilup-desktop-extras-windows.exe
          path: release/windows
      
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: bilup-desktop-extras-macos
          path: release/macos
      
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: bilup-desktop-extras-linux
          path: release/linux
      
      - name: Prepare release files
        run: |
          cp release/windows/bilup-desktop-extras.exe release/bilup-desktop-extras-windows.exe
          cp release/macos/bilup-desktop-extras-macos release/bilup-desktop-extras-macos
          cp release/linux/bilup-desktop-extras-linux release/bilup-desktop-extras-linux
          chmod +x release/bilup-desktop-extras-macos
          chmod +x release/bilup-desktop-extras-linux
          ls -la release/
      
      - name: Generate release body
        run: node build/generate-release-body.js ${{ steps.version.outputs.version }}
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: build/release-body.md
          draft: false
          prerelease: false
          files: |
            release/bilup-desktop-extras-windows.exe
            release/bilup-desktop-extras-macos
            release/bilup-desktop-extras-linux