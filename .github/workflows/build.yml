name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      peerjs-port:
        description: 'Default PeerJS server port'
        required: true
        default: '8080'
        type: string

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: node16-win-x64
            output: bilup-desktop-extras.exe
            artifact-name: bilup-desktop-extras-windows
          - os: macos-latest
            target: node16-macos-x64
            output: bilup-desktop-extras-macos
            artifact-name: bilup-desktop-extras-macos
          - os: ubuntu-latest
            target: node16-linux-x64
            output: bilup-desktop-extras-linux
            artifact-name: bilup-desktop-extras-linux
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install pkg
        run: npm install -g pkg
      
      - name: Build executable
        run: pkg . --output ${{ matrix.output }} --target ${{ matrix.target }}
      
      - name: Test on Windows
        if: matrix.os == 'windows-latest'
        run: |
          Start-Process -FilePath .\${{ matrix.output }} -ArgumentList "--peerjs-port 9000" -PassThru
          Start-Sleep -Seconds 3
          $portUsed = Get-NetTCPConnection -LocalPort 9000 -ErrorAction SilentlyContinue
          if ($portUsed) {
            Write-Host "Server started successfully on port 9000"
          } else {
            Write-Host "Failed to start server on port 9000"
            exit 1
          }
      
      - name: Test on macOS
        if: matrix.os == 'macos-latest'
        run: |
          chmod +x ${{ matrix.output }}
          ./${{ matrix.output }} --peerjs-port 9000 &
          sleep 3
          if lsof -Pi :9000 -sTCP:LISTEN -t >/dev/null ; then
            echo "Server started successfully on port 9000"
          else
            echo "Failed to start server on port 9000"
            exit 1
          fi
      
      - name: Test on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x ${{ matrix.output }}
          ./${{ matrix.output }} --peerjs-port 9000 &
          sleep 3
          if ss -tlnp | grep :9000 > /dev/null ; then
            echo "Server started successfully on port 9000"
          else
            echo "Failed to start server on port 9000"
            exit 1
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.output }}