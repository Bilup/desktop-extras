name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      peerjs-port:
        description: 'Default PeerJS server port'
        required: true
        default: '8080'
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install pkg
        run: npm install -g pkg
      
      - name: Build executable
        run: pkg . --output bilup-desktop-extras.exe --target node16-win-x64
      
      - name: Test with custom port
        run: |
          Start-Process -FilePath .\bilup-desktop-extras.exe -ArgumentList "--peerjs-port 9000" -PassThru
          Start-Sleep -Seconds 3
          $portUsed = Get-NetTCPConnection -LocalPort 9000 -ErrorAction SilentlyContinue
          if ($portUsed) {
            Write-Host "Server started successfully on port 9000"
          } else {
            Write-Host "Failed to start server on port 9000"
            exit 1
          }
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilup-desktop-extras
          path: bilup-desktop-extras.exe